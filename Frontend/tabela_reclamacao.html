<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAREX - Painel de Gestão</title>

    <link rel="stylesheet" href="styleNicoly02.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header class="topo">
        <div class="logo-area" style="position: relative;">
            <i class="fa-solid fa-gear" id="btnEngrenagem" style="cursor: pointer;"></i>
            <h1>PAREX</h1>

            <div class="dropdown-menu" id="dropdownMenu">
                <button id="btnDarkMode" aria-label="botão de modo escuro" class="dropdown-item">🌙 Modo Escuro</button>
            </div>
        </div>

        <p>Fale Fácil - Painel de Gestão</p>
    </header>

    <main class="container">

        <aside id="painel-filtro">
            <div class="titulo-filtro">
                <h2>Filtrar</h2>
            </div>

            <div class="grupo-filtro">
                <button class="accordion" aria-label="filtro por categoria">
                    Categoria
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

                <div class="conteudo-accordion">
                    <label><input type="checkbox"> Áreas</label>
                    <label><input type="checkbox"> Refeições</label>
                    <label><input type="checkbox"> Repúblicas</label>
                    <label><input type="checkbox"> Segurança</label>
                </div>
            </div>

            <div class="grupo-filtro">
                <button class="accordion" aria-label="filtro de status">
                    Status
                    <i class="fa-solid fa-chevron-down"></i>
                </button>

                <div class="conteudo-accordion">
                    <label><input type="checkbox"> Pendente</label>
                    <label><input type="checkbox"> Em tratativa</label>
                    <label><input type="checkbox"> Resolvido</label>
                </div>
            </div>

            <div style="padding: 20px; text-align: center; margin-top: 20px; border-top: 1px solid var(--borda-grupo);">
                <a href="historico_demandas.html" style="display: block; text-align: center; background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; text-decoration: none; transition: 0.3s;" onmouseover="this.style.backgroundColor='#dc2626'" onmouseout="this.style.backgroundColor='#ef4444'">
                    <i class="fa-solid fa-trash-can"></i> Ver Lixeira
                </a>
            </div>

        </aside>

        <section class="conteudo">
            <div class="area-botao-filtro" aria-label="botão do filtro">
                <button id="abrir-filtro">
                    <i class="fa-solid fa-sliders"></i>
                    Filtros
                </button>
            </div>
            
            <div class="tabela-area" aria-label="tabela que informa as reclamações salvas no DataBase">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Categoria</th>
                            <th>Nome</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-demandas">
                    </tbody>
                </table>
            </div>

            <div id="descricao">
                <p id="texto-exibido">Clique no botão de edição (lápis com quadrado) de uma demanda para visualizar a descrição detalhada aqui.</p>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptNicoly.js"></script>
</body>
</html>
