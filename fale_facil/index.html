<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal Fale Fácil - Parex Protótipo 2</title>
    <link rel="stylesheet" href="style_davi1.css">
</head>
<body>
    
    <div class="lateral-azul">
        <img src="parex-logo.png" alt="Logo Parex" class="logo-parex">
        <div class="detalhe-recorte"></div>
        
     
        
    </div>

   <div class="area-direita">
    
    <span class="engrenagem-config" id="btnEngrenagem">⚙</span>

    <div class="dropdown-menu" id="dropdownMenu">
        <a href="login.html" class="dropdown-item">🔒 Acesso Administrativo</a>
        <button id="btnDarkMode" aria-label="botão de modo escuro e acesso ao login administrativo" class="dropdown-item">🌙 Modo Escuro
     </button>
    </div>

    <div class="container-card">
    <div class="linha-topo"></div>
    <h2>Canal Fale Fácil</h2>
    
    <form id="formDemandas">
        
        <div style="display: none;" aria-hidden="true">
            <label for="campoArmadilha">Se você é humano, deixe este campo em branco</label>
            <input type="text" id="campoArmadilha" name="campoArmadilha" tabindex="-1">
        </div>

        <div class="wrapper-input">
            <select id="categoriaDemanda" aria-label="bloco de texto" class="input-padrao select-custom" required>
                <option value="" disabled selected>Sobre o que deseja falar?</option>
                <option value="1">Áreas</option>
                <option value="2">Refeições</option>
                <option value="3">Repúblicas</option>
                <option value="4">Questões de segurança</option>
            </select>
        </div>

        <div class="container-toggle">
            <label class="switch">
                <input type="checkbox" id="toggleIdentificar" aria-label="campo para identificação" >
                <span class="slider"></span>
            </label>
            <span class="label-toggle">Desejo me identificar</span>
        </div>

                <div class="wrapper-input">
                    <textarea id="textoDemanda" aria-label="campo para relatar sobre o que aconteceu"  class="input-padrao txt-grande" placeholder="O Que Aconteceu?" required></textarea>
                </div>

                <div id="areaIdentificacao" aria-label="campo para informar o nome"  class="wrapper-input" style="display: none;">
                    <label class="texto-pequeno">Seu Nome / Matrícula</label>
                    <input type="text" id="nomeUsuario" class="input-padrao" placeholder="Digite seu nome">
                </div>

                <button type="submit" class="btn-enviar">Enviar Registro</button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptDavi.js"></script>
</body>
</html>
